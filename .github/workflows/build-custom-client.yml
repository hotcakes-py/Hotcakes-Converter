name: Build Custom RustDesk Client

on:
  workflow_dispatch:
    inputs:
      config_json:
        description: 'Configuración del cliente en formato JSON'
        required: true
        type: string
      version:
        description: 'Versión del cliente'
        required: false
        default: '1.4.9'
        type: string

jobs:
  build-windows:
    name: Build Windows Client
    runs-on: windows-latest
    steps:
      - name: Checkout RustDesk source
        uses: actions/checkout@v4
        with:
          repository: rustdesk/rustdesk
          ref: master
          path: rustdesk

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc
          override: true

      - name: Install dependencies
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
          choco install ninja -y
        shell: pwsh

      - name: Build RustDesk
        working-directory: rustdesk
        run: |
          cargo build --release --target x86_64-pc-windows-msvc
        shell: pwsh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-client-windows
          path: rustdesk/target/x86_64-pc-windows-msvc/release/rustdesk.exe
